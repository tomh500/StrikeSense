<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrikeSense - OEM 解锁申请</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">StrikeSense</a>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">返回首页</a>
                <a href="rescenter.html">资源下载中心</a>
                <a href="scriptdocs.html">脚本文档</a>
                <a href="oemkeygen.html" class="active-link">OEM申请</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <section class="container tool-panel">
            <span class="badge">OEM 解锁申请</span>
            <h1>StrikeSense OEM Key Generator</h1>
            <p class="tool-lead">用于生成 OEM 授权密钥。请根据授权周期生成对应类型，并妥善保存输出结果。</p>

            <div class="form-grid">
                <label for="stamp">Stamp (YYYYMMDDHHMM)</label>
                <input id="stamp" type="text">

                <label for="type">Type</label>
                <select id="type">
                    <option>24h</option>
                    <option>7d</option>
                    <option>1m</option>
                    <option>6m</option>
                    <option>1y</option>
                    <option>10y</option>
                    <option>50y</option>
                    <option>forever</option>
                </select>

                <div class="tool-actions">
                    <button class="btn btn-primary" id="generate" type="button">Generate</button>
                    <button class="btn btn-secondary" id="copy" type="button">Copy</button>
                </div>

                <label for="output">Key</label>
                <textarea id="output" readonly></textarea>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p class="copyright">&copy; 2026 无损平方集团. All Rights Reserved. 保留所有权利。</p>
        </div>
    </footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('open');
            navLinks.classList.toggle('open');
        });
    </script>
    <script>
        const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_";
        const secret = new TextEncoder().encode("StrikeSenseOEMKey2026");

        function nowStamp() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, "0");
            return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}`;
        }

        function fnv1a(text) {
            const bytes = new TextEncoder().encode(text);
            let value = 2166136261 >>> 0;
            for (const byte of bytes) {
                value ^= byte;
                value = Math.imul(value, 16777619) >>> 0;
            }
            return value >>> 0;
        }

        function xorPayload(bytes) {
            const out = new Uint8Array(bytes);
            for (let i = 0; i < out.length; i += 1) {
                out[i] = out[i] ^ secret[i % secret.length] ^ ((i * 29 + 17) & 0xff);
            }
            return out;
        }

        function encode64(bytes) {
            let out = "";
            let value = 0;
            let bits = -6;
            for (const byte of bytes) {
                value = (value << 8) + byte;
                bits += 8;
                while (bits >= 0) {
                    out += alphabet[(value >> bits) & 63];
                    bits -= 6;
                }
            }
            if (bits > -6) {
                out += alphabet[((value << 8) >> (bits + 8)) & 63];
            }
            return out;
        }

        function makeKey(stamp, kind) {
            if (!/^\d{12}$/.test(stamp)) {
                throw new Error("Stamp must be YYYYMMDDHHMM");
            }
            const body = `SSOEM1|${stamp}|${kind}`;
            const check = fnv1a(`${body}|StrikeSense`).toString(16);
            return encode64(xorPayload(new TextEncoder().encode(`${body}|${check}`)));
        }

        document.getElementById("stamp").value = nowStamp();

        document.getElementById("generate").addEventListener("click", () => {
            const stamp = document.getElementById("stamp").value.trim();
            const kind = document.getElementById("type").value;
            const output = document.getElementById("output");
            try {
                output.value = makeKey(stamp, kind);
            } catch (error) {
                output.value = `Error: ${error.message}`;
            }
        });

        document.getElementById("copy").addEventListener("click", async () => {
            const text = document.getElementById("output").value;
            if (!text) return;
            await navigator.clipboard.writeText(text);
        });
    </script>
</body>
</html>
