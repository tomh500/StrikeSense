<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrikeSense 高清道具图生成器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="itemmaker.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="#" class="logo">StrikeSense</a>
            <div class="nav-links">
                <a href="index.html">返回首页</a>
                <a href="rescenter.html">资源下载中心</a>
            </div>
        </div>
    </nav>

    <!-- 主内容区：上下结构，彻底解放空间 -->
    <main class="container itemmaker-main">
        
        <!-- 🎯 顶部：巨大的画布高清预览区 -->
        <div class="preview-area wide-preview card">
            <div class="preview-header">
                <div class="header-title-group">
                    <span class="main-title">C 图片实时预览工作台 (16:9 视网膜超清)</span>
                    <span class="tip">提示：可直接在下方画布上用鼠标/触屏进行线条标注绘画</span>
                </div>
                <div class="active-map-badge" id="mapBadge">当前地图: de_mirage</div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="mainCanvas" width="1920" height="1080"></canvas>
            </div>
        </div>

        <!-- 🛠️ 底部：全功能模块化仪表盘操作台 -->
        <div class="dashboard-grid">
            
            <!-- 第一栏：基础信息配置 -->
            <div class="dashboard-card card">
                <h4 class="card-subtitle">1. 基础信息配置</h4>
                <div class="form-group">
                    <label for="mapSelect">选择比赛地图</label>
                    <select id="mapSelect" class="form-control">
                        <option value="de_mirage">Mirage (荒漠迷城)</option>
                        <option value="de_inferno">Inferno (炼狱小镇)</option>
                        <option value="de_dust2">Dust2 (炽热沙城2)</option>
                        <option value="de_nuke">Nuke (核子危机)</option>
                        <option value="de_ancient">Ancient (远古遗迹)</option>
                        <option value="de_anubis">Anubis (阿努比斯)</option>
                        <option value="de_overpass">Overpass (死亡游乐园)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="textRemark">左上角文字备注</label>
                    <input type="text" id="textRemark" class="form-control" value="Jumpthrow" placeholder="例如: Jumpthrow / Runthrow">
                </div>
                <div class="form-group">
                    <label for="fileName">保存文件名</label>
                    <input type="text" id="fileName" class="form-control" value="mirage1" placeholder="输出的文件名">
                </div>
            </div>

            <!-- 第二栏：图片 A 上传与无级缩放拉伸 -->
            <div class="dashboard-card card">
                <h4 class="card-subtitle">2. 图片 A (左侧·站位投掷)</h4>
                <div class="file-upload-box">
                    <input type="file" id="uploadA" accept="image/*" class="file-input">
                    <label for="uploadA" class="btn btn-secondary btn-sm btn-block">选择/更换图片 A</label>
                    <div id="statusA" class="upload-status">未选择图片</div>
                </div>
                
                <!-- 实时拉伸控制组 -->
                <div class="transform-controls" id="controlsA" style="opacity: 0.5; pointer-events: none;">
                    <div class="slider-group">
                        <label>画布内缩放: <span id="valScaleA">1.0</span>x</label>
                        <input type="range" id="scaleA" min="0.2" max="3.0" step="0.05" value="1.0">
                    </div>
                    <div class="slider-group">
                        <label>左右平移 (X): <span id="valX_A">0</span>px</label>
                        <input type="range" id="offsetX_A" min="-600" max="600" step="5" value="0">
                    </div>
                    <div class="slider-group">
                        <label>上下平移 (Y): <span id="valY_A">0</span>px</label>
                        <input type="range" id="offsetY_A" min="-600" max="600" step="5" value="0">
                    </div>
                </div>
            </div>

            <!-- 第三栏：图片 B 上传与无级缩放拉伸 -->
            <div class="dashboard-card card">
                <h4 class="card-subtitle">3. 图片 B (右侧·瞄准落点)</h4>
                <div class="file-upload-box">
                    <input type="file" id="uploadB" accept="image/*" class="file-input">
                    <label for="uploadB" class="btn btn-secondary btn-sm btn-block">选择/更换图片 B</label>
                    <div id="statusB" class="upload-status">未选择图片</div>
                </div>
                
                <!-- 实时拉伸控制组 -->
                <div class="transform-controls" id="controlsB" style="opacity: 0.5; pointer-events: none;">
                    <div class="slider-group">
                        <label>画布内缩放: <span id="valScaleB">1.0</span>x</label>
                        <input type="range" id="scaleB" min="0.2" max="3.0" step="0.05" value="1.0">
                    </div>
                    <div class="slider-group">
                        <label>左右平移 (X): <span id="valX_B">0</span>px</label>
                        <input type="range" id="offsetX_B" min="-600" max="600" step="5" value="0">
                    </div>
                    <div class="slider-group">
                        <label>上下平移 (Y): <span id="valY_B">0</span>px</label>
                        <input type="range" id="offsetY_B" min="-600" max="600" step="5" value="0">
                    </div>
                </div>
            </div>

            <!-- 第四栏：高级标注画笔工具箱 & 导出下载 -->
            <div class="dashboard-card card flex-column-between">
                <div>
                    <h4 class="card-subtitle">4. 战术标注工具箱</h4>
                    <div class="tool-buttons">
                        <button type="button" class="tool-btn active" data-tool="brush" data-color="#ff4d4d" style="background-color: #ff4d4d;" title="战术红针"></button>
                        <button type="button" class="tool-btn" data-tool="brush" data-color="#22c55e" style="background-color: #22c55e;" title="安全绿线"></button>
                        <button type="button" class="tool-btn" data-tool="brush" data-color="#eab308" style="background-color: #eab308;" title="警示黄点"></button>
                        <button type="button" class="tool-btn" data-tool="brush" data-color="#3b82f6" style="background-color: #3b82f6;" title="参考蓝线"></button>
                        <button type="button" class="tool-btn" data-tool="eraser" id="btnEraser" title="橡皮擦工具">🧽</button>
                    </div>
                    <div class="slider-group" style="margin-top: 15px;">
                        <label style="display:flex; justify-content:space-between;">
                            <span>画笔粗细</span>
                            <span><span id="sizeVal">10</span>px</span>
                        </label>
                        <input type="range" id="brushSize" min="4" max="40" value="10">
                    </div>
                    <button type="button" class="btn btn-secondary btn-sm" id="btnClear" style="width: 100%; margin-top: 12px; border-radius: 8px;">🧹 清空屏幕所有标注</button>
                </div>

                <!-- 导出激活区 -->
                <button id="btnDownload" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 20px; border-radius: 10px; font-weight: bold;">💾 生成并下载合成道具图</button>
            </div>

        </div>
    </main>

    <script src="itemmaker.js"></script>
</body>
</html>
